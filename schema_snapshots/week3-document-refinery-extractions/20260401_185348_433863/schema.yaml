contract_id: week3-document-refinery-extractions
captured_at: '2026-04-01T18:53:48Z'
schema:
  doc_id:
    type: string
    format: uuid
    required: true
    unique: true
    description: Primary key. UUIDv4 per document extraction run.
  source_path:
    type: string
    required: true
    minLength: 1
    description: Absolute path or https URL of source document.
  source_hash:
    type: string
    pattern: ^[a-f0-9]{64}$
    required: true
    description: SHA-256 of the source file.
  extracted_facts:
    type: object
    minItems: 1
    required: true
    items:
      fact_id:
        type: string
        format: uuid
        required: true
        unique: true
      text:
        type: string
        required: true
        minLength: 1
      entity_refs:
        type: array
        items:
          type: string
          format: uuid
      confidence:
        type: number
        minimum: 0.0
        maximum: 1.0
        required: true
        description: Model confidence; breaking if scaled to 0–100 integer.
      page_ref:
        type: integer
        required: false
        nullable: true
      source_excerpt:
        type: string
        required: true
  entities:
    type: array
    required: true
    items:
      entity_id:
        type: string
        format: uuid
        required: true
      name:
        type: string
        required: true
      type:
        type: string
        enum:
        - PERSON
        - ORG
        - LOCATION
        - DATE
        - AMOUNT
        - OTHER
        required: true
      canonical_value:
        type: string
        required: true
  extraction_model:
    type: string
    required: true
    pattern: ^(claude|gpt)-
    description: Model identifier; must match claude-* or gpt-*.
  processing_time_ms:
    type: integer
    minimum: 1
    required: true
    description: Wall-clock processing time in milliseconds; must be positive.
  token_count:
    type: object
    required: true
    properties:
      input:
        type: integer
        minimum: 0
      output:
        type: integer
        minimum: 0
  extracted_at:
    type: string
    format: date-time
    required: true
    description: Extraction completion timestamp (RFC 3339 / ISO 8601 date-time).
  notes:
    type: string
    required: false
    description: Synthetic ADD for evolution demo
