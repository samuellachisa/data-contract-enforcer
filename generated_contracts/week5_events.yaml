kind: DataContract
apiVersion: v3.0.0
id: week5-event-sourcing-events
info:
  title: Week 5 Event Sourcing — Event Records
  version: 1.0.0
  owner: week5-team
  description: Append-only event log per aggregate with JSON payload.
servers:
  local:
    type: local
    path: outputs/week5/events.jsonl
    format: jsonl
terms:
  usage: Internal platform event contract.
  limitations: PascalCase event_type registered in registry.
schema:
  event_id:
    type: string
    format: uuid
    required: true
    unique: true
  event_type:
    type: string
    required: true
    pattern: ^[A-Z][a-zA-Z0-9]*$
    description: PascalCase event type registered in event schema registry.
  aggregate_id:
    type: string
    format: uuid
    required: true
  aggregate_type:
    type: string
    required: true
    pattern: ^[A-Z][a-zA-Z0-9]*$
  sequence_number:
    type: integer
    minimum: 0
    required: true
    description: Monotonic per aggregate_id, no gaps or duplicates.
  payload:
    type: object
    required: true
    description: Must validate against event_type JSON Schema.
  metadata:
    type: object
    description: Required on each event; inner keys follow JSON Schema object form.
    additionalProperties: false
    required:
    - correlation_id
    - user_id
    - source_service
    properties:
      causation_id:
        oneOf:
        - type: string
          format: uuid
        - type: 'null'
        description: Prior event UUID when applicable; null otherwise.
      correlation_id:
        type: string
        format: uuid
      user_id:
        type: string
        minLength: 1
      source_service:
        type: string
        minLength: 1
  schema_version:
    type: string
    required: true
  occurred_at:
    type: string
    format: date-time
    required: true
  recorded_at:
    type: string
    format: date-time
    required: true
quality:
  type: SodaChecks
  specification:
    checks for events:
    - missing_count(event_id) = 0
    - missing_count(sequence_number) = 0
    - recorded_at >= occurred_at
    - payload.bytes >= 0
    - missing_count(metadata.correlation_id) = 0
    - min(sequence_number) >= 0
    - max(sequence_number) >= min(sequence_number)
    - min(recorded_at) >= min(occurred_at)
    - row_count >= 1
lineage:
  upstream: []
  downstream:
  - id: week7-contract-enforcer
    description: Week 7 validates event payloads and ordering
    fields_consumed:
    - event_type
    - payload
    - sequence_number
    - aggregate_id
    breaking_if_changed:
    - payload
    - event_type
profiling:
  ingest:
    jsonl_lines_accepted: 55
    jsonl_lines_rejected: 0
    issue_sample: []
    type_anomalies:
      payload_non_object_count: 0
      sequence_number_non_int_count: 0
      metadata_non_object_count: 0
llm_annotations:
  column: payload.bytes
  table: events
  description: 'Column `payload.bytes` in `events`; neighbors: [''event_type'', ''aggregate_id'']. Treat as contract-critical:
    downstream validators and drift checks depend on stable semantics.'
  business_rule: 'Keep `payload.bytes` distribution consistent with baseline (detect >2σ drift as WARN, >3σ as FAIL). Breaking
    changes require migration impact report. Observed profile on this snapshot: min=7057.0, max=99992.0, mean=60029.490909090906,
    p95=98053.09999999999.'
  cross_column_relationship: Join keys and consumer fields are listed under `lineage.downstream` in the data contract.
  samples:
  - '48739'
  - '10171'
  - '82678'
  - '87951'
  - '95339'
  statistical_context:
    min: 7057.0
    max: 99992.0
    mean: 60029.490909090906
    p95: 98053.09999999999
    stddev: 29215.75241597819
