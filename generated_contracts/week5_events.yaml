kind: DataContract
apiVersion: v3.0.0
id: week5-event-sourcing-events
info:
  title: Week 5 Event Sourcing — Event Records
  version: 1.0.0
  owner: week5-team
  description: Append-only event log per aggregate with JSON payload.
servers:
  local:
    type: local
    path: outputs/week5/events.jsonl
    format: jsonl
terms:
  usage: Internal platform event contract.
  limitations: PascalCase event_type registered in registry.
schema:
  event_id:
    type: string
    format: uuid
    required: true
    unique: true
  event_type:
    type: string
    required: true
    pattern: ^[A-Z][a-zA-Z0-9]*$
    description: PascalCase event type registered in event schema registry.
  aggregate_id:
    type: string
    format: uuid
    required: true
  aggregate_type:
    type: string
    required: true
    pattern: ^[A-Z][a-zA-Z0-9]*$
  sequence_number:
    type: integer
    minimum: 0
    required: true
    description: Monotonic per aggregate_id, no gaps or duplicates.
  payload:
    type: object
    required: true
    description: Must validate against event_type JSON Schema.
  metadata:
    type: object
    required: true
    properties:
      causation_id:
        type:
        - string
        - 'null'
        format: uuid
      correlation_id:
        type: string
        format: uuid
        required: true
      user_id:
        type: string
        required: true
      source_service:
        type: string
        required: true
  schema_version:
    type: string
    required: true
  occurred_at:
    type: string
    format: iso8601
    required: true
  recorded_at:
    type: string
    format: iso8601
    required: true
quality:
  type: SodaChecks
  specification:
    checks for events:
    - missing_count(event_id) = 0
    - missing_count(sequence_number) = 0
    - recorded_at >= occurred_at
lineage:
  upstream: []
  downstream:
  - id: week7-contract-enforcer
    description: Week 7 validates event payloads and ordering
    fields_consumed:
    - event_type
    - payload
    - sequence_number
    - aggregate_id
    breaking_if_changed:
    - payload
    - event_type
llm_annotations:
  column: payload.bytes
  table: events
  description: Inferred business column `payload.bytes` adjacent to ['event_type', 'aggregate_id'].
  business_rule: values for `payload.bytes` should remain consistent with historical profile
  cross_column_relationship: See contract lineage.downstream for consumer fields.
  samples:
  - '48739'
  - '10171'
  - '82678'
  - '87951'
  - '95339'
