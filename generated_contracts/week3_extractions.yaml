llm_annotations:
  column: extracted_facts.confidence
  table: extractions
  description: The 'extracted_facts.confidence' column represents the confidence level of the extracted facts from documents,
    indicating the reliability of the extraction process.
  business_rule: Confidence values should be between 0 and 1, where values closer to 1 indicate higher confidence in the accuracy
    of the extracted information.
  cross_column_relationship: The confidence level is related to 'extraction_model', as different models may yield varying
    confidence scores for the same document, and it should be consistent across the same 'doc_id' and 'source_hash'.
  samples:
  - '0.35'
  - '0.35'
  - '0.64'
  provider: openrouter
  statistical_context:
    min: 0.35
    max: 0.64
    mean: 0.4466666666666666
    p95: 0.611
    stddev: 0.1367073110293992
  distribution_clause_notes: []
