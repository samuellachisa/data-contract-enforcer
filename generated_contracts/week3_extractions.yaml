    p25: 0.61
    p50: 0.71
    p75: 0.87
    p95: 0.95
    p99: 0.9646
    stddev: 0.14283481761799866
  processing_time_ms_stats:
    min: 258.0
    max: 4944.0
    mean: 2861.0363636363636
    p25: 2234.0
    p50: 3064.0
    p75: 3794.5
    p95: 4817.4
    p99: 4907.82
    stddev: 1292.6232237886204
  ingest:
    jsonl_lines_accepted: 55
    jsonl_lines_rejected: 0
    issue_sample: []
    type_anomalies:
      extracted_facts_confidence_non_numeric_count: 0
      extracted_facts_wrong_type_row_count: 0
llm_annotations:
  column: extracted_facts.confidence
  table: extractions
  description: 'Column `extracted_facts.confidence` in `extractions`; neighbors: [''doc_id'', ''source_hash'', ''extraction_model''].
    Treat as contract-critical: downstream validators and drift checks depend on stable semantics.'
  business_rule: 'Keep `extracted_facts.confidence` distribution consistent with baseline (detect >2σ drift as WARN, >3σ as
    FAIL). Breaking changes require migration impact report. Observed profile on this snapshot: min=0.5, max=0.97, mean=0.7238181818181818,
    p95=0.95.'
  cross_column_relationship: Join keys and consumer fields are listed under `lineage.downstream` in the data contract.
  samples:
  - '0.71'
  - '0.61'
  - '0.61'
  - '0.8'
  - '0.53'
  statistical_context:
    min: 0.5
    max: 0.97
    mean: 0.7238181818181818
    p95: 0.95
    stddev: 0.14283481761799866
