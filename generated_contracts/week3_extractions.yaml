kind: DataContract
apiVersion: v3.0.0
id: week3-document-refinery-extractions
info:
  title: Week 3 Document Refinery — Extraction Records
  version: 1.0.0
  owner: week3-team
  description: One record per processed document with extracted facts and entities.
servers:
  local:
    type: local
    path: outputs/week3/extractions.jsonl
    format: jsonl
terms:
  usage: Internal inter-system data contract. Do not publish.
  limitations: confidence must remain in 0.0–1.0 float range (not 0–100 int).
schema:
  doc_id:
    type: string
    format: uuid
    required: true
    unique: true
    description: Primary key. UUIDv4 per document extraction run.
  source_path:
    type: string
    required: true
    minLength: 1
    description: Absolute path or https URL of source document.
  source_hash:
    type: string
    pattern: ^[a-f0-9]{64}$
    required: true
    description: SHA-256 of the source file.
  extracted_facts:
    type: array
    minItems: 1
    required: true
    items:
      fact_id:
        type: string
        format: uuid
        required: true
        unique: true
      text:
        type: string
        required: true
        minLength: 1
      entity_refs:
        type: array
        items:
          type: string
          format: uuid
      confidence:
        type: number
        minimum: 0.0
        maximum: 1.0
        required: true
        description: Model confidence; breaking if scaled to 0–100 integer.
      page_ref:
        type: integer
        required: false
        nullable: true
      source_excerpt:
        type: string
        required: true
  entities:
    type: array
    required: true
    items:
      entity_id:
        type: string
        format: uuid
        required: true
      name:
        type: string
        required: true
      type:
        type: string
        enum:
        - PERSON
        - ORG
        - LOCATION
        - DATE
        - AMOUNT
        - OTHER
        required: true
      canonical_value:
        type: string
        required: true
  extraction_model:
    type: string
    required: true
    pattern: ^(claude|gpt)-
    description: Model identifier; must match claude-* or gpt-*.
  processing_time_ms:
    type: integer
    minimum: 1
    required: true
    description: Wall-clock processing time in milliseconds; must be positive.
  token_count:
    type: object
    required: true
    properties:
      input:
        type: integer
        minimum: 0
      output:
        type: integer
        minimum: 0
  extracted_at:
    type: string
    format: iso8601
    required: true
    description: Extraction completion timestamp (UTC Z).
quality:
  type: SodaChecks
  specification:
    checks for extractions:
    - missing_count(doc_id) = 0
    - duplicate_count(doc_id) = 0
    - min(fact_confidence) >= 0.0
    - max(fact_confidence) <= 1.0
    - missing_count(extracted_facts[*].fact_id) = 0
    - duplicate_count(extracted_facts[*].fact_id) = 0
    - min(extracted_facts[*].confidence) >= 0.0
    - max(extracted_facts[*].confidence) <= 1.0
    - min(processing_time_ms) >= 1
    - row_count >= 1
    - max(cardinality(extracted_facts[*].entity_refs)) >= 0
lineage:
  upstream: []
  downstream:
  - id: week3-document-refinery
    description: Lineage edge PRODUCES from file::src/week3/extractor.py to pipeline::week3-document-refinery
    fields_consumed:
    - doc_id
    - extracted_facts
    - extraction_model
    breaking_if_changed:
    - extracted_facts.confidence
    - doc_id
  - id: cartographer.py
    description: Lineage edge CONSUMES from pipeline::week3-document-refinery to file::src/week4/cartographer.py
    fields_consumed:
    - doc_id
    - extracted_facts
    - extraction_model
    breaking_if_changed:
    - extracted_facts.confidence
