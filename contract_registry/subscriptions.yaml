# Manually maintained. Every inter-system data dependency must be listed here.
# Blast radius for violations: ViolationAttributor queries this file first (Tier 1 registry).

subscriptions:
  - contract_id: week3-document-refinery-extractions
    subscriber_id: week4-cartographer
    subscriber_team: week4
    fields_consumed: [doc_id, extracted_facts, extraction_model]
    breaking_fields:
      - field: extracted_facts.confidence
        reason: used for node ranking; scale change breaks ranking logic
      - field: doc_id
        reason: primary key for node identity in lineage graph
    validation_mode: ENFORCE
    registered_at: "2026-01-10T09:00:00Z"
    contact: week4-team@org.com

  - contract_id: week4-brownfield-lineage-snapshots
    subscriber_id: week7-violation-attributor
    subscriber_team: week7
    fields_consumed: [nodes, edges, git_commit]
    breaking_fields:
      - field: edges.relationship
        reason: attributor assumes IMPORTS|CALLS|READS|WRITES|PRODUCES|CONSUMES for traversal
      - field: nodes.node_id
        reason: stable node identity required for blast radius and blame chain
    validation_mode: ENFORCE
    registered_at: "2026-01-10T10:00:00Z"
    contact: week7-team@org.com

  - contract_id: week5-event-sourcing-events
    subscriber_id: week7-validation-runner
    subscriber_team: week7
    fields_consumed: [payload, event_type, metadata, sequence_number, occurred_at, recorded_at]
    breaking_fields:
      - field: payload
        reason: DocumentProcessed JSON must match event schema registry
      - field: sequence_number
        reason: monotonic per aggregate_id required for replay correctness
    validation_mode: AUDIT
    registered_at: "2026-01-10T10:30:00Z"
    contact: week7-team@org.com

  - contract_id: langsmith-trace-runs
    subscriber_id: week7-ai-extensions
    subscriber_team: week7
    fields_consumed: [total_tokens, prompt_tokens, completion_tokens, run_type, start_time, end_time]
    breaking_fields:
      - field: total_tokens
        reason: must equal prompt_tokens + completion_tokens for cost accounting
    validation_mode: AUDIT
    registered_at: "2026-01-10T11:00:00Z"
    contact: week7-team@org.com
